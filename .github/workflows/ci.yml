name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-market-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: income-platform/src/market-data-service
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: income-platform/src/market-data-service
        env:
          JWT_SECRET: test-secret-for-ci
          PYTHONPATH: ${{ github.workspace }}/income-platform/src
        run: python -m pytest tests/ --tb=short

