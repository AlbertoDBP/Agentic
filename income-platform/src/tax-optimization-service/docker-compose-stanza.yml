# ─────────────────────────────────────────────────────────────────────────────
# Agent 05 — Tax Optimization Service
# Add this service block inside the `services:` section of docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────

  tax-optimization-service:
    build:
      context: src/tax-optimization-service
      dockerfile: Dockerfile
    container_name: tax-optimization-service
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ASSET_CLASSIFICATION_URL=http://asset-classification-service:8004
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - income-platform-network
