      - DATABASE_URL=${PGBOUNCER_URL:-${DATABASE_URL}}
      - REDIS_URL=${REDIS_URL}
      - FMP_API_KEY=${FMP_API_KEY}
      - MARKET_DATA_SERVICE_URL=http://market-data-service:8001
      - NEWSLETTER_SERVICE_URL=http://agent-02-newsletter-ingestion:8002
      - ASSET_CLASSIFICATION_SERVICE_URL=http://agent-04-asset-classification:8004
      - DATA_QUALITY_SERVICE_URL=http://agent-14-data-quality:8014
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_TOKEN=${SERVICE_TOKEN}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SERVICE_PORT=8003
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    ports:
