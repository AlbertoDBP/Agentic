services:

# ─────────────────────────────────────────────────────────────────────────────
# PgBouncer — Connection pooler for DO managed PostgreSQL
# Upstream:  DATABASE_URL (real DO Postgres, set in .env)
# Services connect to:  PGBOUNCER_URL (e.g. postgresql://user:pass@pgbouncer:5432/dbname)
# Add PGBOUNCER_URL to .env — same credentials as DATABASE_URL but host=pgbouncer port=5432 sslmode=disable
# If PGBOUNCER_URL is not set, services fall back to DATABASE_URL (direct connection).
# ─────────────────────────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0-p0
    container_name: pgbouncer
    environment:
      # URL without ?sslmode=... query string — SSL handled by SERVER_TLS_SSLMODE below
      - DATABASE_URL=postgresql://${PG_USER}:${PG_PASSWORD}@${PG_HOST}:${PG_PORT:-25060}/${PG_DATABASE}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=25
      - MIN_POOL_SIZE=2
      - RESERVE_POOL_SIZE=5
      - SERVER_TLS_SSLMODE=require
      - LOG_CONNECTIONS=0
      - LOG_DISCONNECTIONS=0
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  market-data-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-data-service
    environment:
      - DATABASE_URL=${PGBOUNCER_URL:-${DATABASE_URL}}
      - REDIS_URL=${REDIS_URL}
      - MARKET_DATA_API_KEY=${MARKET_DATA_API_KEY}
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - FMP_API_KEY=${FMP_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_PORT=8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SERVICE_TOKEN=${SERVICE_TOKEN}
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8001"
    depends_on:
      pgbouncer:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 384m
    command: python3 src/market-data-service/main.py
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  agent-02-newsletter-ingestion:
    build:
      context: src/agent-02-newsletter-ingestion
      dockerfile: Dockerfile
    container_name: agent-02-newsletter-ingestion
    environment:
      - DATABASE_URL=${PGBOUNCER_URL:-${DATABASE_URL}}
      - REDIS_URL=${REDIS_URL}
      - APIDOJO_SA_API_KEY=${APIDOJO_SA_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FMP_API_KEY=${FMP_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_TOKEN=${SERVICE_TOKEN}
      - SERVICE_PORT=8002
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SERVICE_TOKEN=${SERVICE_TOKEN}
      - PYTHONUNBUFFERED=1
      - PREFECT_SERVER_ALLOW_EPHEMERAL_MODE=true
      - PREFECT_HOME=/tmp/prefect
    ports:
      - "8002:8002"
    restart: unless-stopped
    mem_limit: 256m
    depends_on:
      market-data-service:
        condition: service_healthy
    command: python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8002
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  agent-03-income-scoring:
    build:
      context: src/income-scoring-service
      dockerfile: Dockerfile
    container_name: agent-03-income-scoring
